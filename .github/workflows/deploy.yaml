name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".github/**"
      - "!.github/actions/cache-nextjs/**"
      - "!.github/actions/setup-bun/**"
      - "!.github/workflows/deploy.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # needed for "last updated" to work for doc pages

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Lint
        run: bun run lint
      - name: Cache Next.js
        uses: ./.github/actions/cache-nextjs

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_SITE_HOST: ${{ vars.SITE_HOST }}
          NEXT_PUBLIC_PLAUSIBLE_HOST: ${{ secrets.PLAUSIBLE_HOST }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: ./out/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write 
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
